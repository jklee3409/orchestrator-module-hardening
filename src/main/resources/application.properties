spring.application.name=orchestrator
spring.profiles.default=local

# jpa
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# swagger
springdoc.swagger-ui.path=/swagger-ui.html

# jwt
jwt.secret=${JWT_SECRET}
security.jmeter-bypass.enabled=false
security.jmeter-bypass.test-key=

# session
spring.session.store-type=redis
spring.session.redis.namespace=orchestrator:session
server.servlet.session.timeout=10m
server.servlet.session.cookie.path=/

# open ai
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gemini-2.0-flash

# mail
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=eureca.capstone.project.orchestrator.alarm.dto.AlarmCreationDto
spring.kafka.consumer.properties.spring.json.trusted.packages=eureca.capstone.project.orchestrator.alarm.dto
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.admin.auto-create=true

# local-friendly defaults for app integration points
app.security.cookie.secure=false
app.security.cookie.same-site=Lax
app.security.cookie.domain=
app.urls.verify-email-base=http://localhost:8080/orchestrator/auth/verify-email?token=
app.urls.frontend-verify-complete=http://localhost:5173/verify-email-complete
app.urls.reset-password-base=http://localhost:5173/reset-password?token=
app.urls.oauth-success-redirect=http://localhost:5173/oauth/callback

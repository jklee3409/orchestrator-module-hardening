spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/capstone_project?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=orchestrator
spring.datasource.password=orchestrator

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# Local-only JWT fallback. Set JWT_SECRET to override.
jwt.secret=${JWT_SECRET:local-dev-jwt-secret-for-orchestrator-only}

security.jmeter-bypass.enabled=${SECURITY_JMETER_BYPASS_ENABLED:false}
security.jmeter-bypass.test-key=${SECURITY_JMETER_BYPASS_TEST_KEY:local-bid-hotpath}

server.servlet.session.cookie.same-site=Lax

spring.ai.openai.api-key=test-api-key
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=local@datcha.test
spring.mail.password=local
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

payment.toss.secret_key=test_sk_local
payment.toss.client_key=test_ck_local

spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.registration.google.client-id=test-google-client
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub

spring.security.oauth2.client.registration.naver.client-id=test-naver-client
spring.security.oauth2.client.registration.naver.client-secret=test-naver-secret
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.elasticsearch.uris=http://localhost:9200
spring.kafka.bootstrap-servers=localhost:9092
